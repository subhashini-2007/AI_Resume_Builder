<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | AI Resume Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #F0FFF4;
      --bg-secondary: #DCFCE7;
      --text-primary: #14532D;
      --text-secondary: #4B5563;
      --accent-primary: #22C55E;
      --accent-secondary: #16A34A;
      --border-color: #BBF7D0;
      --border-radius: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0a0a0c;
        --bg-secondary: #121216;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-primary: #22C55E;
        --accent-secondary: #16A34A;
        --border-color: #272730;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid Background matching App styles */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, rgba(34, 197, 94, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(34, 197, 94, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      z-index: 1;
    }

    .glow-1 {
      position: absolute;
      top: -20%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
      z-index: 2;
      filter: blur(40px);
    }

    .glow-2 {
      position: absolute;
      bottom: -20%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(134, 239, 172, 0.12) 0%, transparent 70%);
      z-index: 2;
      filter: blur(40px);
    }

    .container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px 0 rgba(22, 163, 74, 0.05);
    }

    .icon-container {
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3);
      animation: pulse 2s infinite alternate;
    }

    .icon-container svg {
      width: 40px;
      height: 40px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3);
      }
      100% {
        transform: scale(1.06);
        box-shadow: 0 8px 32px rgba(34, 197, 94, 0.55);
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="container">
    <div class="icon-container">
      <!-- Wifi Off Icon -->
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M12 20h.01" />
      </svg>
    </div>
    <h1>Connection Lost</h1>
    <p>You are currently offline. Please check your internet connection or Wi-Fi settings, then try reloading the application.</p>
    <button onclick="window.location.reload();" class="retry-btn">
      <!-- Refresh Icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle; margin-right:4px;">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
      Try Again
    </button>
  </div>
</body>
</html>
