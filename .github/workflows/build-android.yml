name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          npm install caniuse-lite@latest

      - name: Run Assets Setup
        run: |
          cd frontend
          mkdir -p public/icons
          node setup-assets.js

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Generate Release Keystore
        run: |
          cd frontend/android/app
          # Generate temporary release keystore for compilation
          keytool -genkeypair -v -keystore release-key.jks \
            -alias airesumekey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass airesumebuilder123 -keypass airesumebuilder123 \
            -dname "CN=Subhashini, O=AI Resume Builder, C=US"

      - name: Sync Capacitor to Android
        run: |
          cd frontend
          npm run build:static
          npx cap sync android

      - name: Build Release APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Resume-Builder-Release-APK
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
